
<!DOCTYPE html>
<html>
<head>
    <title>Login - JOY Amusement Park</title>
    <link rel="stylesheet" href="css/style.css">


    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;

            /* Background Image */
            background: linear-gradient(
                        rgba(0,0,0,0.6),
                        rgba(0,0,0,0.6)
                      ),
                      url('images/joypark.jpg') no-repeat center center fixed;

            background-size: cover;

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Glass Login Card */
        .login-box {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            padding: 40px;
            width: 350px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            text-align: center;
            color: white;
        }

        .login-box h2 {
            margin-bottom: 20px;
            font-size: 28px;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 30px;
            outline: none;
        }

        .login-box input[type="submit"] {
            background: linear-gradient(45deg, #ff512f, #dd2476);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-box input[type="submit"]:hover {
            transform: scale(1.05);
            background: linear-gradient(45deg, #00c6ff, #0072ff);
        }

        .login-box a {
            color: #fff;
            text-decoration: none;
            font-size: 14px;
        }

        .login-box a:hover {
            text-decoration: underline;
        }
        


    </style>
</head>

<body>
    <div class="navbar">
    <div class="logo">
        <span class="joy-text">JOY</span>
    </div>
    
</div>

    <div class="login-box">
        <h2>JOY Login</h2>

        <form action="php/login.php" method="POST" autocomplete="off">
    <input type="text" name="email" placeholder="Enter Username" required autocomplete="off">
    <input type="password" name="password" placeholder="Enter Password" required autocomplete="new-password">
    <input type="submit" value="Login">
</form>

        <p style="margin-top:15px;">
            Don't have account? <a href="register.html">Register</a>
        </p>
       <p id="errorMsg" style="color:red;"></p>

<script>

const params = new URLSearchParams(window.location.search);

if(params.get("error")){
document.getElementById("errorMsg").innerText="Invalid Email or Password";
}

</script> 
    </div>

</body>
</html>
