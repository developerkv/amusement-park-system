
<!DOCTYPE html>
<html>
<head>
<title>User Register</title>

<style>

body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;

            /* Background Image */
            background: linear-gradient(
                        rgba(0,0,0,0.6),
                        rgba(0,0,0,0.6)
                      ),
                      url('images/joypark.jpg') no-repeat center center fixed;

            background-size: cover;

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }


/* Glass Login Card */

.login-box{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(12px);
padding:40px;
width:350px;
border-radius:20px;
box-shadow:0 0 30px rgba(0,0,0,0.5);
text-align:center;
color:white;
}

.login-box h2{
margin-bottom:20px;
font-size:28px;
}


/* input fields */

.login-box input{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:6px;
outline:none;
}


/* button */

.login-box button{
width:100%;
padding:10px;
margin-top:10px;
background:#ff4b2b;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

.login-box button:hover{
background:#ff2a00;
}

.login-box a{
color:#ffd700;
text-decoration:none;
}

</style>

</head>

<body>

<div class="login-box">

<h2>User Registration</h2>

<form action="php/register.php" method="POST" autocomplete="off">

<input type="text" name="name" placeholder="Full Name" required autocomplete="off">

<input type="email" name="email" placeholder="Email" required autocomplete="off">

<input type="password" name="password" placeholder="Password" required autocomplete="new-password">

<input type="tel"
name="phone"
placeholder="Phone Number"
pattern="[0-9]{10}"
maxlength="10"
title="Enter 10 digit phone number"
required>

<button type="submit">Register</button>

</form>

<br>

<a href="login.html">Login</a>

</div>

</body>
</html>
